<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdulla Rabee | The Experience Blog</title>
    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 1. Reading Progress Bar -->
    <div class="progress-container"><div class="progress-bar" id="readingProgress"></div></div>

    <!-- 2. Custom Cursor -->
    <div class="cursor-follower"></div>

    <!-- 3. Sticky Glass Header -->
    <header class="main-header">
        <nav class="nav-pill">
            <div class="logo">A<span>R</span></div>
            <ul class="nav-links">
                <li class="magnetic">Home</li>
                <li class="magnetic">Experience</li>
                <li class="magnetic">Archive</li>
            </ul>
            <button id="theme-toggle" class="neumorphic-btn">
                <div class="sun-moon"></div>
            </button>
            <div class="hamburger">
                <svg viewBox="0 0 100 100" width="40"><path class="line top" d="m 30,33 h 40" /><path class="line bottom" d="m 30,67 h 40" /></svg>
            </div>
        </nav>
    </header>

    <main>
        <!-- 4. Hero Section (Parallax + Staggered Entrance) -->
        <section class="hero">
            <h1 class="reveal-text">Designing Digital <span>Experiences</span></h1>
            <p class="stagger-load">A journey through motion, code, and aesthetics.</p>
        </section>

        <!-- 5. Bento Box Grid -->
        <section class="bento-grid">
            <article class="bento-item featured hover-scale" data-tilt>
                <div class="glass-card">
                    <span class="tag">Featured</span>
                    <h2>The Future of GSAP 4.0</h2>
                    <div class="read-time">5 min read</div>
                </div>
            </article>
            <article class="bento-item tall hover-scale">
                <div class="glass-card">
                    <span class="tag">Tech</span>
                    <h2>Architecture of Speed</h2>
                </div>
            </article>
            <!-- More items here -->
        </section>
    </main>

    <!-- 6. Floating Socials -->
    <aside class="social-sidebar">
        <a href="#" class="social-icon">Li</a>
        <a href="#" class="social-icon">Tw</a>
        <a href="#" class="social-icon">Gh</a>
    </aside>

    <script src="main.js"></script>
</body>
    </html>
