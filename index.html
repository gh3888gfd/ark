<!DOCTYPE html>
<html lang="en" data-theme="system">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdulla Rabee | The Experience Blog</title>
    <!-- Fonts: Serif for Headings, Sans for Body -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Custom Cursor Follower -->
    <div class="cursor-follower"></div>

    <!-- Scroll Progress Bar -->
    <div class="progress-container">
        <div class="progress-bar" id="readingProgress"></div>
    </div>

    <!-- Glass Header & Navigation -->
    <header class="glass-header">
        <nav class="nav-container">
            <div class="logo">AR<span>.</span></div>
            <ul class="nav-links">
                <li class="magnetic-item"><a href="#work">Experience</a></li>
                <li class="magnetic-item"><a href="#blog">Journal</a></li>
                <li class="magnetic-item contact-btn"><a href="#newsletter">Let's Talk</a></li>
            </ul>
        </nav>
    </header>

    <main class="smooth-scroll-wrapper">
        <!-- Hero Section -->
        <section class="hero-section">
            <h1 class="reveal-text">Curated <span class="ghost-text">Experiences</span></h1>
            <p class="stagger-in">A modular journey through design, code, and philosophy.</p>
        </section>

        <!-- Bento Box Grid -->
        <section class="bento-container" id="work">
            <div class="bento-grid">
                <div class="bento-item tall tilt-card" data-speed="0.1">
                    <span class="badge">Featured</span>
                    <div class="bento-content">
                        <h2>The Future of Web3</h2>
                        <p>5 min read</p>
                    </div>
                </div>
                <div class="bento-item wide tilt-card">
                    <h2>Experience Timeline</h2>
                    <div id="mini-timeline"></div>
                </div>
                <div class="bento-item tilt-card">
                    <div class="heart-pop-area">
                        <span>Tap to Like</span>
                        <div id="like-count">124</div>
                    </div>
                </div>
                <div class="bento-item tilt-card">
                    <h2>Newsletter</h2>
                    <p>No spam, just value.</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="main.js"></script>
</body>
    </html>
